global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Métricas exportadas por el OTel Collector (viene de ambos microservicios)
  - job_name: "otel-collector-metrics"
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics

  # Métricas internas del collector
  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]

  # Prometheus se auto-monitorea
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
